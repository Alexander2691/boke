<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blog - 个人博客</title>
  <script type="module" crossorigin src="/assets/main-JuhN4k6a.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/main-BD5qY9EH.js">
  <link rel="stylesheet" crossorigin href="/assets/main-DzdPVh1a.css">
</head>
<body>

  <div id="progress-bar"></div>

  <header>
    <div class="container-wide">
      <a href="index.html" class="logo">My Blog</a>
      <div class="nav-right">
        <nav>
          <a href="index.html">首页</a>
          <a href="archive.html">归档</a>
          <a href="projects.html">项目</a>
          <a href="about.html">关于</a>
          <a href="contact.html">联系</a>
        </nav>
        <div class="search-wrap">
          <span class="icon">&#x1F50D;</span>
          <input type="text" id="search-input" placeholder="搜索文章..." autocomplete="off">
        </div>
        <button id="theme-toggle" aria-label="切换主题">&#127769;</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="hero">
        <div class="hero-content">
          <h1>&#x1F4DD; 欢迎来到我的博客</h1>
          <p class="subtitle">记录技术成长，分享知识与生活</p>
          <div class="hero-stats">
            <span><strong>14</strong> 篇文章</span>
            <span><strong>4</strong> 个分类</span>
            <span><strong>2026</strong> 开始写作</span>
          </div>
        </div>
      </section>

      <div class="tags-filter">
        <button class="tag-btn active" data-filter="all">全部</button>
        <button class="tag-btn" data-filter="tech">&#x1F4BB; 技术</button>
        <button class="tag-btn" data-filter="tutorial">&#x1F4D6; 教程</button>
        <button class="tag-btn" data-filter="note">&#x1F4DD; 笔记</button>
        <button class="tag-btn" data-filter="life">&#x1F331; 生活</button>
      </div>

      <div id="search-count"></div>
      <ul class="posts" id="post-list"></ul>
    </div>
  </main>

  <button id="back-to-top" aria-label="回到顶部">&#x2191;</button>

  <footer>
    <div class="container">
      <div class="social-links">
        <a href="#" aria-label="GitHub">&#x1F5A5;</a>
        <a href="#" aria-label="Twitter">&#x1F426;</a>
        <a href="#" aria-label="Email">&#x2709;</a>
        <a href="#" aria-label="RSS">&#x1F4E1;</a>
      </div>
      <p>&copy; 2026 My Blog. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
