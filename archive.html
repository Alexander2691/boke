<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>归档 - My Blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="progress-bar"></div>

  <header>
    <div class="container-wide">
      <a href="index.html" class="logo">My Blog</a>
      <div class="nav-right">
        <nav>
          <a href="index.html">首页</a>
          <a href="archive.html">归档</a>
          <a href="projects.html">项目</a>
          <a href="about.html">关于</a>
          <a href="contact.html">联系</a>
        </nav>
        <button id="theme-toggle" aria-label="切换主题">&#127769;</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title">&#x1F4C2; 文章归档</h1>
      <p class="page-subtitle">按时间顺序浏览所有文章</p>

      <div class="archive-year" id="archive-2026"></div>
    </div>
  </main>

  <button id="back-to-top" aria-label="回到顶部">&#x2191;</button>

  <footer>
    <div class="container">
      <div class="social-links">
        <a href="#" aria-label="GitHub">&#x1F5A5;</a>
        <a href="#" aria-label="Twitter">&#x1F426;</a>
        <a href="#" aria-label="Email">&#x2709;</a>
        <a href="#" aria-label="RSS">&#x1F4E1;</a>
      </div>
      <p>&copy; 2026 My Blog. All rights reserved.</p>
    </div>
  </footer>

  <script type="module" src="/js/main.js"></script>
  <script>
    const archivePosts = [
      { title: '开始写博客', date: '2026-06-14', tags: ['life'], file: 'hello-world.md' },
      { title: 'JavaScript 异步编程入门', date: '2026-06-12', tags: ['tech', 'tutorial'], file: 'js-async.md' },
      { title: 'CSS Grid 布局指南', date: '2026-06-10', tags: ['tech', 'tutorial'], file: 'css-grid.md' },
      { title: 'Git 工作流最佳实践', date: '2026-06-08', tags: ['tech', 'note'], file: 'git-workflow.md' },
      { title: 'Python 实用技巧 10 则', date: '2026-06-06', tags: ['tech', 'tutorial'], file: 'python-tips.md' },
      { title: 'TypeScript 入门笔记', date: '2026-06-04', tags: ['tech', 'note'], file: 'typescript-intro.md' },
      { title: 'HTTP/3 与 QUIC 协议新特性', date: '2026-07-02', tags: ['tech', 'note'], file: 'http3-quic.md' },
      { title: 'RESTful API 设计最佳实践', date: '2026-06-30', tags: ['tech', 'tutorial'], file: 'api-design.md' },
      { title: 'Linux 常用命令速查', date: '2026-06-28', tags: ['tech', 'tutorial'], file: 'linux-commands.md' },
      { title: '我的技术书单', date: '2026-06-26', tags: ['life', 'note'], file: 'book-list.md' },
      { title: '2026 年前端技术趋势', date: '2026-06-24', tags: ['tech', 'note'], file: 'frontend-trends.md' },
      { title: '2026 年高效 VS Code 插件推荐', date: '2026-06-22', tags: ['tech', 'note'], file: 'vscode-plugins.md' },
      { title: 'React Hooks 完全解析', date: '2026-06-20', tags: ['tech', 'tutorial'], file: 'react-hooks.md' },
      { title: 'Docker 入门指南', date: '2026-06-18', tags: ['tech', 'tutorial'], file: 'docker-intro.md' }
    ];

    const tagMap = { tech: '技术', tutorial: '教程', note: '笔记', life: '生活' };
    const container = document.getElementById('archive-2026');
    const h2 = document.createElement('h2');
    h2.textContent = '2026';
    container.appendChild(h2);
    const ul = document.createElement('ul');
    ul.className = 'archive-list';
    archivePosts.forEach(p => {
      const li = document.createElement('li');
      li.className = 'archive-item';
      li.innerHTML = `
        <span class="archive-date">${p.date.slice(5)}</span>
        <a href="posts/${p.file.replace('.md', '.html')}">${p.title}</a>
        <span class="archive-tags">${p.tags.map(t => `<span class="tag ${t}">${tagMap[t] || t}</span>`).join('')}</span>
      `;
      ul.appendChild(li);
    });
    container.appendChild(ul);
  </script>
</body>
</html>
