<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系 - My Blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="progress-bar"></div>

  <header>
    <div class="container-wide">
      <a href="index.html" class="logo">My Blog</a>
      <div class="nav-right">
        <nav>
          <a href="index.html">首页</a>
          <a href="archive.html">归档</a>
          <a href="projects.html">项目</a>
          <a href="about.html">关于</a>
          <a href="contact.html">联系</a>
        </nav>
        <div class="search-wrap">
          <span class="icon">&#x1F50D;</span>
          <input type="text" id="search-input" placeholder="搜索文章..." autocomplete="off">
        </div>
        <button id="theme-toggle" aria-label="切换主题">&#127769;</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="contact-page">
        <h1>&#x1F4E9; 联系我</h1>
        <p>有合作意向或想交流技术？欢迎给我留言！</p>

        <form id="contact-form">
          <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" placeholder="你的名字" required>
          </div>
          <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="subject">主题</label>
            <input type="text" id="subject" placeholder="你想聊什么？">
          </div>
          <div class="form-group">
            <label for="message">留言</label>
            <textarea id="message" placeholder="写下你想说的..." required></textarea>
          </div>
          <button type="submit" class="submit-btn">&#x1F680; 发送消息</button>
        </form>
      </div>
    </div>
  </main>

  <button id="back-to-top" aria-label="回到顶部">&#x2191;</button>

  <footer>
    <div class="container">
      <div class="social-links">
        <a href="#" aria-label="GitHub">&#x1F5A5;</a>
        <a href="#" aria-label="Twitter">&#x1F426;</a>
        <a href="#" aria-label="Email">&#x2709;</a>
        <a href="#" aria-label="RSS">&#x1F4E1;</a>
      </div>
      <p>&copy; 2026 My Blog. All rights reserved.</p>
    </div>
  </footer>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
